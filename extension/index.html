<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>2D → 3D Topographic Map</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>

  <div class="app-shell">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0078d4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 17l4-8 4 5 3-3 4 6"/>
          <rect x="1" y="1" width="22" height="22" rx="3"/>
        </svg>
        <span>Topo3D</span>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section-label">WORKSPACE</div>
        <a class="nav-item active" href="#">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
          Convert Image
        </a>
        <div class="nav-section-label" style="margin-top:20px">EXPORT</div>
        <a class="nav-item" id="nav-png" href="#" style="pointer-events:none;opacity:.4">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9l4-4 4 4 5-5 5 5"/></svg>
          3D Plot (PNG)
        </a>
        <a class="nav-item" id="nav-csv" href="#" style="pointer-events:none;opacity:.4">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg>
          Height Data (CSV)
        </a>
        <a class="nav-item" id="nav-xlsx" href="#" style="pointer-events:none;opacity:.4">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13l2 4 4-4"/></svg>
          Height Data (Excel)
        </a>
      </nav>

      <div class="sidebar-footer">
        <button id="btn-reset" class="reset-btn hidden">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
          New Image
        </button>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main-content">

      <!-- Drop panel -->
      <section id="drop-section">
        <div class="panel-header">
          <span class="panel-title">Input</span>
          <span class="panel-badge">Image</span>
        </div>
        <div id="drop-zone">
          <div class="drop-body">
            <svg class="drop-svg" viewBox="0 0 64 64" fill="none" stroke="#0078d4" stroke-width="1.5">
              <rect x="8" y="8" width="48" height="48" rx="6" stroke="#d0d0d0"/>
              <polyline points="20,40 28,28 36,34 44,22 52,36"/>
              <circle cx="22" cy="22" r="4" fill="#e8f4ff" stroke="#0078d4"/>
            </svg>
            <p class="drop-primary">Drop topographic image here</p>
            <p class="drop-secondary">or <span class="link-text">click to browse</span> &mdash; PNG, JPG, BMP supported</p>
            <input type="file" id="file-input" accept="image/*" hidden />
          </div>
        </div>
        <div id="status" class="status-bar hidden">
          <span class="spinner"></span>
          <span id="status-text"></span>
        </div>
      </section>

      <!-- Results panel -->
      <section id="results" class="hidden">
        <div class="panel-header">
          <span class="panel-title">Output</span>
          <span class="panel-badge" id="result-label">3D Surface</span>
        </div>
        <div id="plot"></div>
      </section>

    </main>
  </div>

  <script src="lib/plotly.min.js"></script>
  <script src="lib/xlsx.min.js"></script>
  <script src="index.js"></script>
</body>
</html>
